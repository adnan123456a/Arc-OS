<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcOS — Browser Linux Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Source+Code+Pro:wght@400;600&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/topbar.css">
<link rel="stylesheet" href="css/dock.css">
<link rel="stylesheet" href="css/windows.css">
<link rel="stylesheet" href="css/apps.css">
<link rel="stylesheet" href="css/games.css">
<link rel="stylesheet" href="css/ui.css">
<style>
/* ══ TASKBAR ══ */
#taskbar{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:9990;pointer-events:none;max-width:90vw;flex-wrap:wrap;justify-content:center}
.taskbar-pill{pointer-events:all;display:flex;align-items:center;gap:6px;padding:4px 8px 4px 6px;background:rgba(14,14,28,.9);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:11px;color:var(--text-dim);transition:all .15s;max-width:130px}
.taskbar-pill:hover{background:rgba(94,129,244,.25);color:var(--text)}
.taskbar-pill-icon{width:18px;height:18px;border-radius:5px;flex-shrink:0;overflow:hidden}
.taskbar-pill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.taskbar-pill-x{margin-left:2px;opacity:0;transition:opacity .15s;font-size:13px}
.taskbar-pill:hover .taskbar-pill-x{opacity:.6}

/* ══ ALT-TAB ══ */
#alttab-sw{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,24,.97);backdrop-filter:blur(36px);border:1px solid var(--border);border-radius:18px;padding:16px 22px;display:flex;gap:10px;z-index:999999;box-shadow:0 24px 80px rgba(0,0,0,.85)}
.alttab-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border-radius:12px;cursor:pointer;border:2px solid transparent;min-width:68px;transition:all .12s}
.alttab-item:hover{background:rgba(255,255,255,.07)}
.alttab-item.active{border-color:var(--accent);background:rgba(94,129,244,.12)}

/* ══ SNAP PREVIEW ══ */
.snap-preview{position:fixed;background:rgba(94,129,244,.15);border:2px solid rgba(94,129,244,.45);border-radius:12px;pointer-events:none;z-index:9900;display:none;transition:all .12s}

/* ══ SPREADSHEET ══ */
#spreadsheet-content{display:flex;flex-direction:column;height:100%;background:#0f0f1a}
.sheet-toolbar{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--win-bar);border-bottom:1px solid var(--border);flex-wrap:wrap}
.sheet-wrap{flex:1;overflow:auto}
.sheet-table{border-collapse:collapse;font-size:12px}
.sheet-table th{background:rgba(255,255,255,.06);padding:5px 10px;border:1px solid var(--border);color:var(--text-dim);font-weight:600;min-width:88px;text-align:center;position:sticky;top:0;z-index:2}
.sheet-table td{border:1px solid rgba(255,255,255,.06);padding:0;min-width:88px;height:27px}
.sheet-cell{width:100%;height:100%;background:transparent;border:none;color:var(--text);font-family:'Source Code Pro',monospace;font-size:12px;padding:3px 6px;outline:none}
.sheet-cell:focus{background:rgba(94,129,244,.13);outline:2px solid var(--accent)}
.sheet-row-hdr{background:rgba(255,255,255,.06);color:var(--text-dim);font-size:11px;text-align:center;padding:4px 6px;border:1px solid var(--border);min-width:36px;position:sticky;left:0;z-index:1;font-family:'Source Code Pro',monospace}

/* ══ MAPS ══ */
#maps-content{display:flex;flex-direction:column;height:100%;background:#1a2634}
#maps-search-bar{display:flex;gap:8px;padding:10px 14px;background:var(--win-bar);border-bottom:1px solid var(--border);align-items:center}
#maps-input{flex:1;padding:7px 12px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
#maps-input:focus{border-color:var(--accent)}
#maps-frame{flex:1;border:none}

/* ══ HEX EDITOR ══ */
#hexed-content{display:flex;flex-direction:column;height:100%;background:#0b0b16}
.hexed-toolbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--win-bar);border-bottom:1px solid var(--border)}
#hexed-body{display:flex;flex:1;min-height:0;font-family:'Source Code Pro',monospace;font-size:12.5px;line-height:1.85}
#hexed-offset{padding:10px 10px;background:rgba(0,0,0,.3);color:rgba(255,255,255,.3);border-right:1px solid var(--border);user-select:none;min-width:72px;overflow:hidden}
#hexed-hex{flex:2;padding:10px;color:#a8ff78;overflow-y:auto;border-right:1px solid var(--border);white-space:pre-wrap;word-break:break-all}
#hexed-ascii{flex:1;padding:10px;color:#79dcff;overflow-y:auto;white-space:pre-wrap;word-break:break-all}

/* ══ NETWORK SCANNER ══ */
#netscanner-content{display:flex;flex-direction:column;height:100%;background:#0b0b16;padding:16px;gap:10px;overflow-y:auto}
.net-scan-header{display:flex;align-items:center;gap:10px}
.net-result{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--card);border:1px solid var(--border);border-radius:9px;font-size:12px;font-family:'Source Code Pro',monospace;animation:fadeIn .4s ease}
.net-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.net-ip{color:var(--accent);min-width:120px}
.net-host{color:var(--text);flex:1}
.net-ports{color:var(--text-dim);font-size:11px}
.net-latency{color:var(--green);min-width:50px;text-align:right}

/* ══ PROCESS INSPECTOR ══ */
#proc-content{display:flex;flex-direction:column;height:100%;background:#0b0b16}
.proc-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--win-bar);border-bottom:1px solid var(--border)}
#proc-search{flex:1;padding:5px 10px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:'Source Code Pro',monospace;outline:none}
#proc-search:focus{border-color:var(--accent)}
#proc-table-wrap{flex:1;overflow-y:auto}
#proc-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'Source Code Pro',monospace}
#proc-table th{padding:7px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);text-align:left;color:var(--text-dim);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;position:sticky;top:0}
#proc-table td{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.035);color:var(--text-dim)}
#proc-table tr:hover td{background:rgba(255,255,255,.04);color:var(--text)}
.proc-kill{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.4);color:var(--red);border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.proc-kill:hover{background:var(--red);color:#fff;border-color:var(--red)}

/* ══ ARDUINO ══ */
#arduino-content{display:flex;flex-direction:column;height:100%;background:#0f1923}
.ard-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1a2634;border-bottom:1px solid rgba(0,135,138,.4);flex-wrap:wrap}
#ard-code{flex:1;padding:14px;background:transparent;border:none;color:#cdd6f4;font-family:'Source Code Pro',monospace;font-size:13px;resize:none;outline:none;line-height:1.7;tab-size:2}
#ard-serial{height:130px;background:#050d0d;border-top:1px solid rgba(0,135,138,.3);padding:10px 14px;font-family:'Source Code Pro',monospace;font-size:12px;color:#00ff88;overflow-y:auto;flex-shrink:0;white-space:pre-wrap}

/* ══ TRANSLATOR ══ */
#translator-content{display:flex;flex-direction:column;height:100%;background:#0f0f1a}
.trans-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--win-bar);border-bottom:1px solid var(--border)}
.trans-lang-sel{padding:6px 10px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
#trans-body{display:flex;flex:1;min-height:0}
#trans-input,#trans-output{flex:1;padding:16px;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:14px;resize:none;outline:none;line-height:1.7}
#trans-input{border-right:1px solid var(--border)}
#trans-output{background:rgba(0,0,0,.2);color:var(--accent3);cursor:default}

/* ══ COLOR PICKER ══ */
#colorpicker-content{display:flex;flex-direction:column;height:100%;background:#11111e;padding:18px;gap:14px;align-items:center;overflow-y:auto}
.cp-swatch{width:100px;height:100px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);flex-shrink:0;border:3px solid rgba(255,255,255,.12)}
.cp-row{display:flex;align-items:center;gap:10px;width:100%;max-width:360px}
.cp-label{font-size:12px;color:var(--text-dim);width:44px;flex-shrink:0}
.cp-slider{flex:1;height:6px;accent-color:var(--accent);cursor:pointer}
.cp-val{font-size:12px;font-family:'Source Code Pro',monospace;min-width:40px;text-align:right;color:var(--text-dim)}
.cp-hex{width:100%;max-width:360px;padding:10px 14px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:9px;font-family:'Source Code Pro',monospace;font-size:16px;color:var(--text);text-align:center;font-weight:700;letter-spacing:2px}
.cp-palette{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:360px}
.cp-color{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s}
.cp-color:hover{transform:scale(1.2);border-color:rgba(255,255,255,.5)}

/* ══ UNIT CONVERTER ══ */
#unitconvert-content{display:flex;flex-direction:column;height:100%;background:#11111e;padding:18px;gap:12px;overflow-y:auto}
.uc-tabs{display:flex;flex-wrap:wrap;gap:5px}
.uc-tab{padding:5px 13px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--text-dim);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.uc-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.uc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px}
.uc-input-row{display:flex;align-items:center;gap:8px}
.uc-num{flex:1;padding:10px 12px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;font-family:'Source Code Pro',monospace;outline:none}
.uc-num:focus{border-color:var(--accent)}
.uc-unit{padding:9px 10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
.uc-result{font-size:24px;font-weight:700;text-align:center;color:var(--accent3);padding:12px;background:rgba(72,207,173,.08);border-radius:10px;font-family:'Source Code Pro',monospace}

/* ══ PASSWORD GEN ══ */
#passgen-content{display:flex;flex-direction:column;height:100%;background:#11111e;padding:20px;gap:14px;align-items:center;overflow-y:auto}
#pg-output{width:100%;max-width:430px;padding:16px;background:rgba(0,0,0,.4);border:2px solid var(--border);border-radius:12px;font-family:'Source Code Pro',monospace;font-size:17px;color:#a8ff78;text-align:center;word-break:break-all;letter-spacing:1px;min-height:62px;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
#pg-output:hover{border-color:var(--accent)}
.pg-row{display:flex;align-items:center;gap:12px;width:100%;max-width:430px}
.pg-label{font-size:13px;color:var(--text);flex:1}
.pg-val{font-size:13px;font-family:'Source Code Pro',monospace;color:var(--accent);min-width:30px;text-align:right}
.pg-check{width:17px;height:17px;accent-color:var(--accent);cursor:pointer}
.pg-strength{height:6px;border-radius:3px;width:100%;max-width:430px;background:rgba(255,255,255,.1);overflow:hidden}
.pg-strength-fill{height:100%;border-radius:3px;transition:width .4s,background .4s}
.pg-strength-label{font-size:12px;color:var(--text-dim);text-align:center}

/* ══ ARCHIVE MANAGER ══ */
#archive-content{display:flex;flex-direction:column;height:100%;background:#11111e}
.arc-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--win-bar);border-bottom:1px solid var(--border)}
#arc-list{flex:1;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.arc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;font-size:12px;background:var(--card);border:1px solid var(--border);transition:background .15s}
.arc-item:hover{background:var(--card-hover)}
.arc-name{flex:1;font-family:'Source Code Pro',monospace;color:var(--text)}
.arc-size{font-size:11px;color:var(--text-dim);width:64px;text-align:right}
.arc-badge{font-size:10px;color:var(--accent);background:rgba(94,129,244,.15);padding:2px 7px;border-radius:10px;flex-shrink:0}

/* ══ VISUALIZER ══ */
#visualizer-content{display:flex;flex-direction:column;height:100%;background:#07070f;align-items:center;justify-content:center;gap:12px;padding:16px}
#viz-canvas{border-radius:14px;max-width:100%}
.viz-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo-wrap">
    <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="35" r="18" fill="white" opacity=".95"/>
      <ellipse cx="50" cy="68" rx="32" ry="20" fill="white" opacity=".85"/>
      <circle cx="32" cy="58" r="8" fill="white" opacity=".7"/>
      <circle cx="68" cy="58" r="8" fill="white" opacity=".7"/>
    </svg>
  </div>
  <div class="loader-title">ArcOS</div>
  <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
  <div class="loader-subtitle">Loading desktop environment…</div>
</div>

<div class="snap-preview" id="snap-preview"></div>
<div id="wallpaper"><div id="wallpaper-photo"></div></div>

<!-- TOP BAR -->
<div id="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <button id="activities-btn" onclick="toggleOverview()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
      Activities
    </button>
    <span id="app-menu-name" style="font-weight:700;opacity:.7;font-size:13px;">ArcOS</span>
  </div>
  <span id="clock-display"></span>
  <div id="topbar-right">
    <div class="tray-icon" title="Wi-Fi">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1" fill="currentColor"/></svg>
    </div>
    <div class="tray-icon" title="Volume">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </div>
    <div class="tray-icon" title="Battery">
      <svg width="20" height="14" viewBox="0 0 24 14" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="18" height="12" rx="2"/><path d="M23 5v4" stroke-width="2.5" stroke-linecap="round"/><rect x="3" y="3" width="12" height="8" rx="1" fill="currentColor" opacity=".7"/></svg>
    </div>
    <span id="clock-right" style="font-weight:600;font-size:13px;letter-spacing:.3px;"></span>
    <div id="profile-pic" onclick="openApp('settings')" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
  </div>
</div>

<!-- OVERVIEW -->
<div id="overview">
  <input id="overview-search" type="text" placeholder="🔍  Search apps…" oninput="filterApps(this.value)">
  <div id="app-cat-bar"></div>
  <div id="overview-pages-wrap" style="position:relative;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;overflow:hidden">
    <button class="page-arrow" id="page-arrow-left"  onclick="overviewPageStep(-1)">‹</button>
    <button class="page-arrow" id="page-arrow-right" onclick="overviewPageStep(1)">›</button>
    <div id="app-grid-pages"></div>
    <div id="overview-page-dots"></div>
  </div>
  <!-- Keep #app-grid for search results (single page) -->
  <div id="app-grid" style="display:none"></div>
</div>

<!-- TASKBAR STRIP -->
<div id="taskbar"></div>

<!-- DOCK (dynamically built) -->
<div id="dock"></div>

<!-- NOTIFICATION -->
<div id="notification">
  <div id="notif-icon" style="font-size:20px"></div>
  <div>
    <div id="notif-title" style="font-weight:700;font-size:13px;margin-bottom:2px"></div>
    <div id="notif-msg" style="font-size:12px;color:var(--text-dim)"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div class="ctx-item" onclick="ctxAction('wallpaper')">🎨 Change Wallpaper</div>
  <div class="ctx-item" onclick="ctxAction('screenshot')">📸 Screenshot</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('terminal')">⌨️ Open Terminal</div>
  <div class="ctx-item" onclick="ctxAction('files')">📁 Open Files</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('settings')">⚙️ Settings</div>
  <div class="ctx-item" onclick="ctxAction('wallpaper')">🎨 Wallpaper</div>
  <div class="ctx-item" onclick="openThemeEditor?.()">🖌 Theme Editor</div>
  <div class="ctx-item" onclick="showLockScreen?.()">🔒 Lock Screen</div>
</div>

<script src="js/core.js"></script>
<script src="js/filesystem.js"></script>
<script src="js/windows.js"></script>
<script src="js/terminal.js"></script>
<script src="js/apps-editors.js"></script>
<script src="js/apps-media.js"></script>
<script src="js/apps-tools.js"></script>
<script src="js/apps-postman.js"></script>
<script src="js/apps-paint.js"></script>
<script src="js/apps-system.js"></script>
<script src="js/games.js"></script>
<script src="js/apps-new.js"></script>
<script src="js/apps-mega.js"></script>
<script src="js/apps-fixes.js"></script>
<script src="js/ui.js"></script>
<script src="js/init.js"></script>
<!-- Desktop Features -->
<script src="js/feature-desktops.js"></script>
<script src="js/feature-spotlight.js"></script>
<script src="js/feature-lockscreen.js"></script>
<script src="js/feature-tiling.js"></script>
<script src="js/feature-notifcenter.js"></script>
<script src="js/feature-widgets.js"></script>
<script src="js/feature-themeeditor.js"></script>
<script src="js/feature-desktopicons.js"></script>
</body>
