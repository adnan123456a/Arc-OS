<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcOS — Browser Linux Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=Cantarell:wght@400;700&family=Source+Code+Pro:wght@400;600&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/topbar.css">
<link rel="stylesheet" href="css/dock.css">
<link rel="stylesheet" href="css/windows.css">
<link rel="stylesheet" href="css/apps.css">
<link rel="stylesheet" href="css/games.css">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo-wrap">
    <svg width="44" height="44" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="35" r="18" fill="white" opacity=".95"/>
      <ellipse cx="50" cy="68" rx="32" ry="20" fill="white" opacity=".85"/>
      <circle cx="32" cy="58" r="8" fill="white" opacity=".7"/>
      <circle cx="68" cy="58" r="8" fill="white" opacity=".7"/>
    </svg>
  </div>
  <div class="loader-title">ArcOS</div>
  <div class="loader-bar-track"><div class="loader-bar-fill"></div></div>
  <div class="loader-subtitle">Loading desktop environment…</div>
</div>

<div id="wallpaper"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <button id="activities-btn" onclick="toggleOverview()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <rect x="1" y="1" width="6" height="6" rx="1.5"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5"/>
      </svg>
      Activities
    </button>
    <span id="app-menu-name" style="font-weight:700;opacity:.7;font-size:13px;">ArcOS</span>
  </div>
  <span id="clock-display"></span>
  <div id="topbar-right">
    <div class="tray-icon" title="Wi-Fi Connected">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor"/>
      </svg>
    </div>
    <div class="tray-icon" title="Volume">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </div>
    <div class="tray-icon" title="Battery">
      <svg width="20" height="14" viewBox="0 0 24 14" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="1" y="1" width="18" height="12" rx="2"/>
        <path d="M23 5v4" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="3" y="3" width="12" height="8" rx="1" fill="currentColor" opacity=".7"/>
      </svg>
    </div>
    <span id="clock-right" style="font-weight:600;font-size:13px;letter-spacing:.3px;"></span>
    <div id="profile-pic" onclick="openApp('settings')" title="Settings">🧑</div>
  </div>
</div>

<!-- OVERVIEW -->
<div id="overview">
  <input id="overview-search" type="text" placeholder="🔍  Search apps…" oninput="filterApps(this.value)">
  <div id="app-grid"></div>
</div>

<!-- DOCK -->
<div id="dock">
  <div class="dock-icon" id="dock-files"     title="Files"          onclick="openApp('files')"      style="background:linear-gradient(145deg,#1db0a6,#148f88)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><path d="M8 12a4 4 0 014-4h10l4 4h14a4 4 0 014 4v20a4 4 0 01-4 4H12a4 4 0 01-4-4V12z" fill="white" opacity=".9"/></svg></div>
  <div class="dock-icon" id="dock-terminal"  title="Terminal"       onclick="openApp('terminal')"   style="background:linear-gradient(145deg,#2d3436,#1a1a2e)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><rect x="6" y="8" width="36" height="28" rx="4" fill="rgba(255,255,255,.12)" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/><polyline points="12,18 20,24 12,30" stroke="#a8ff78" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="22" y1="30" x2="34" y2="30" stroke="#a8ff78" stroke-width="2" stroke-linecap="round"/></svg></div>
  <div class="dock-icon" id="dock-browser"   title="Web Browser"    onclick="openApp('browser')"    style="background:linear-gradient(145deg,#4285f4,#1a73e8)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="18" fill="none" stroke="white" stroke-width="2"/><ellipse cx="24" cy="24" rx="8" ry="18" stroke="white" stroke-width="1.5" fill="none"/><line x1="6" y1="24" x2="42" y2="24" stroke="white" stroke-width="1.5"/></svg></div>
  <div class="dock-icon" id="dock-editor"    title="Text Editor"    onclick="openApp('editor')"     style="background:linear-gradient(145deg,#7c3aed,#a855f7)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><rect x="8" y="6" width="26" height="34" rx="3" fill="rgba(255,255,255,.15)" stroke="white" stroke-width="1.5"/><line x1="13" y1="14" x2="29" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="13" y1="20" x2="29" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="13" y1="26" x2="24" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M32 28l8-8 4 4-8 8-5 1 1-5z" fill="white"/></svg></div>
  <div class="dock-icon" id="dock-code"      title="Code Editor"    onclick="openApp('code')"       style="background:linear-gradient(145deg,#007acc,#0066aa)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><path d="M17 14L7 24l10 10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M31 14l10 10-10 10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="27" y1="12" x2="21" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity=".8"/></svg></div>
  <div class="dock-icon" id="dock-postman"   title="API Tester"     onclick="openApp('postman')"    style="background:linear-gradient(145deg,#ff6c37,#e05a2b)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="16" stroke="white" stroke-width="2" fill="none"/><path d="M16 24h16M24 16l8 8-8 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="dock-sep"></div>
  <div class="dock-icon" id="dock-youtube"   title="YouTube"        onclick="openApp('youtube')"    style="background:linear-gradient(145deg,#ff0000,#cc0000)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><rect x="4" y="12" width="40" height="24" rx="8" fill="none" stroke="white" stroke-width="1.5"/><polygon points="20,18 34,24 20,30" fill="white"/></svg></div>
  <div class="dock-icon" id="dock-music"     title="Music"          onclick="openApp('music')"      style="background:linear-gradient(145deg,#e91e8c,#c2185b)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><circle cx="15" cy="36" r="6" fill="white" opacity=".9"/><circle cx="33" cy="30" r="6" fill="white" opacity=".9"/><line x1="21" y1="36" x2="21" y2="14" stroke="white" stroke-width="2.5"/><line x1="39" y1="30" x2="39" y2="8" stroke="white" stroke-width="2.5"/><polyline points="21,14 39,8" stroke="white" stroke-width="2.5"/></svg></div>
  <div class="dock-icon" id="dock-camera"    title="Camera"         onclick="openApp('camera')"     style="background:linear-gradient(145deg,#00b894,#00897b)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><path d="M42 35a3 3 0 01-3 3H9a3 3 0 01-3-3V20a3 3 0 013-3h4l3-4h8l3 4h11a3 3 0 013 3v15z" fill="rgba(255,255,255,.15)" stroke="white" stroke-width="1.8"/><circle cx="24" cy="27" r="7" stroke="white" stroke-width="2"/></svg></div>
  <div class="dock-icon" id="dock-paint"     title="Paint"          onclick="openApp('paint')"      style="background:linear-gradient(145deg,#fd79a8,#e84393)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><path d="M10 38c0-3 2-5 5-5s5 2 5 5-2 5-5 5-5-2-5-5z" fill="white" opacity=".9"/><path d="M14 33L34 10l4 4L18 37" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/><path d="M34 10l4-4 4 4-4 4z" fill="white" opacity=".8"/></svg></div>
  <div class="dock-sep"></div>
  <div class="dock-icon" id="dock-github"    title="GitHub"         onclick="openApp('github')"     style="background:linear-gradient(145deg,#24292e,#161b22)"><svg width="30" height="30" viewBox="0 0 98 96" fill="white"><path fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z"/></svg></div>
  <div class="dock-icon" id="dock-sysmon"    title="System Monitor" onclick="openApp('sysmon')"     style="background:linear-gradient(145deg,#f59e0b,#d97706)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><polyline points="4,36 14,20 22,28 30,14 38,24 44,12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
  <div class="dock-icon" id="dock-settings"  title="Settings"       onclick="openApp('settings')"   style="background:linear-gradient(145deg,#64748b,#475569)"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="7" stroke="white" stroke-width="2.5"/><path d="M24 4v5M24 39v5M4 24h5M39 24h5M8.5 8.5l3.5 3.5M36 36l3.5 3.5M8.5 39.5L12 36M36 12l3.5-3.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
  <div class="dock-sep"></div>
  <div class="dock-icon" title="All Apps" onclick="toggleOverview()" style="background:var(--card);border:1px solid var(--border)">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
      <rect x="2" y="2" width="8" height="8" rx="2" opacity=".7"/>
      <rect x="14" y="2" width="8" height="8" rx="2" opacity=".7"/>
      <rect x="2" y="14" width="8" height="8" rx="2" opacity=".7"/>
      <rect x="14" y="14" width="8" height="8" rx="2" opacity=".7"/>
    </svg>
  </div>
</div>

<!-- NOTIFICATION -->
<div id="notification">
  <div id="notif-icon" style="font-size:20px"></div>
  <div>
    <div id="notif-title" style="font-weight:700;font-size:13px;margin-bottom:2px"></div>
    <div id="notif-msg" style="font-size:12px;color:var(--text-dim)"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div class="ctx-item" onclick="ctxAction('wallpaper')">🎨 Change Wallpaper</div>
  <div class="ctx-item" onclick="ctxAction('screenshot')">📸 Screenshot</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('terminal')">⌨️ Open Terminal</div>
  <div class="ctx-item" onclick="ctxAction('files')">📁 Open Files</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('settings')">⚙️ Display Settings</div>
</div>

<!-- JS FILES -->
<script src="js/core.js"></script>
<script src="js/filesystem.js"></script>
<script src="js/windows.js"></script>
<script src="js/terminal.js"></script>
<script src="js/apps-editors.js"></script>
<script src="js/apps-media.js"></script>
<script src="js/apps-tools.js"></script>
<script src="js/apps-postman.js"></script>
<script src="js/apps-paint.js"></script>
<script src="js/apps-system.js"></script>
<script src="js/games.js"></script>
<script src="js/ui.js"></script>
<script src="js/init.js"></script>
</body>
</html>
